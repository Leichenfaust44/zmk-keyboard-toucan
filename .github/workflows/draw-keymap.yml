name: Draw ZMK keymaps

on:
  workflow_dispatch:
  push:
    paths:
      - "config/toucan.keymap"
      - "keymap-drawer/keymap_drawer.yaml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/toucan.keymap"
      config_path: "keymap-drawer/keymap_drawer.yaml"
      output_folder: "keymap-drawer"
      draw_args: "toucan:'-j config/toucan.json --layout-name five_col_layout'"
      amend_commit: false
