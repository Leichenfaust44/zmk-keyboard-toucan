name: Draw ZMK keymaps

on:
  workflow_dispatch:
  push:
    paths:
      - "config/piantor_pro_bt.keymap"
      - "keymap-drawer/keymap_drawer.yaml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/piantor_pro_bt.keymap"
      config_path: "keymap-drawer/keymap_drawer.yaml"
      output_folder: "keymap-drawer"
      draw_args: "piantor_pro_bt:'--dts-layout boards/arm/piantor_pro_bt/piantor_pro_bt-layouts.dtsi --layout-name five_col_layout'"
      amend_commit: false
